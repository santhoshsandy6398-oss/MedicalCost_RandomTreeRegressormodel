
name: Test Medical Cost ML Model

on: [push]

jobs:
  run-model:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install numpy pandas scikit-learn

    - name: Run ML model
      run: |
        python MedicalCost_RandomTreeregressormodel.py
